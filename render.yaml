# Blueprint de Render — Static Site (SPA Vite)
# Docs: https://render.com/docs/blueprint-spec
#
# Tras conectar el repo:
# 1. New → Blueprint → selecciorna este render.yaml
# 2. Define VITE_GOOGLE_TTS_API_KEY en el dashboard (valor en build time)

services:
  - type: web
    name: totem-medico
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: VITE_GOOGLE_TTS_API_KEY
        sync: false
      - key: NODE_VERSION
        value: "22.12.0"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
