# Blueprint de Render — Static Site (SPA Vite)
# Docs: https://render.com/docs/blueprint-spec
#
# Importante: NO reescribir /* → index.html (rompe /assets/*.css con 404).
# Esta app no usa rutas profundas; solo necesita /.

services:
  - type: web
    name: totem-medico
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: VITE_GOOGLE_TTS_API_KEY
        sync: false
      - key: NODE_VERSION
        value: "22.12.0"
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
